# LoC exceptions for check-loc.
#
# Each exception must include:
# - path: workspace-relative Rust file path
# - max_lines: temporary per-file cap for that path
# - reason: concrete rationale for why the exception exists
#
# Example:
# [[exceptions]]
# path = "crates/localpaste_gui/src/app/mod.rs"
# max_lines = 1200
# reason = "Temporary during editor state extraction work"

[[exceptions]]
path = "crates/localpaste_gui/src/app/tests/virtual_editor_behaviors.rs"
max_lines = 1100
reason = "Temporary overage while keyboard parity regression matrix lands; split planned after stabilization."

