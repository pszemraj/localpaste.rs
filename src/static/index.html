<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalPaste.rs</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/style.css">
    <style>
    /* Tree view styles */
    .tree-view {
        padding: 0;
        list-style: none;
        user-select: none;
    }
    
    .tree-item {
        margin: 2px 0;
    }
    
    .tree-folder {
        font-weight: 600;
        cursor: pointer;
        padding: 6px 8px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: all 0.2s;
    }
    
    .tree-folder:hover {
        background: var(--bg-tertiary);
    }
    
    .tree-folder.drag-over {
        background: rgba(229, 112, 0, 0.2);
        border: 1px dashed var(--accent);
    }
    
    .tree-folder-icon {
        transition: transform 0.2s;
        display: inline-block;
    }
    
    .tree-folder.expanded .tree-folder-icon {
        transform: rotate(90deg);
    }
    
    .tree-contents {
        margin-left: 20px;
        display: none;
        list-style: none;
        padding: 0;
    }
    
    .tree-folder.expanded + .tree-contents {
        display: block;
    }
    
    .folder-actions button {
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 2px 4px;
        font-size: 14px;
        opacity: 0.7;
        transition: opacity 0.2s;
    }
    
    .folder-actions button:hover {
        opacity: 1;
    }
    
    .tree-paste {
        padding: 4px 8px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    
    .tree-paste:hover {
        background: var(--bg-tertiary);
    }
    
    .tree-paste.active {
        background: var(--accent);
        color: white;
    }
    
    .tree-paste.dragging {
        opacity: 0.5;
    }
    
    .paste-date {
        font-size: 11px;
        opacity: 0.6;
        margin-left: auto;
    }
    
    .empty-state {
        padding: 20px;
        text-align: center;
        opacity: 0.5;
        font-style: italic;
    }
    
    #editor {
        width: 100%;
        height: 100%;
        background: transparent;
        color: transparent;
        caret-color: var(--text-primary);
        border: none;
        outline: none;
        resize: none;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        font-size: 14px;
        line-height: 1.5;
        padding: 20px;
        position: relative;
        z-index: 2;
    }
    
    .highlight-layer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 20px;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        font-size: 14px;
        line-height: 1.5;
        pointer-events: none;
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-y: auto;
        color: var(--text-primary);
        z-index: 1;
    }
    
    /* Syntax highlighting - ONLY colors, no font changes */
    .hl-keyword { color: #ff79c6; }
    .hl-string { color: #f1fa8c; }
    .hl-comment { color: #6272a4; opacity: 0.8; } /* Use opacity instead of italic */
    .hl-number { color: #bd93f9; }
    .hl-function { color: #50fa7b; }
    .hl-type { color: #8be9fd; }
    .hl-operator { color: #ff79c6; }
    .hl-property { color: #50fa7b; }
    .hl-tag { color: #ff79c6; }
    .hl-attribute { color: #50fa7b; }
    .hl-value { color: #f1fa8c; }
    /* Markdown highlighting - ONLY colors, NO layout changes */
    .hl-heading { color: #f1fa8c; }
    .hl-bold { color: inherit; } /* Just keep text color */
    .hl-italic { color: inherit; } /* Just keep text color */
    .hl-code { color: #50fa7b; } /* Just green text, no background */
    .hl-code-block { color: #50fa7b; } /* Just green text for entire block */
    .hl-link { color: #8be9fd; }
    .hl-list-marker { color: #ff79c6; }
    .hl-blockquote { color: #8be9fd; }
    
    .editor-container {
        position: relative;
        background: var(--bg-primary);
    }
    
    .auto-saved {
        color: #3fb950;
        animation: fade-in 0.3s;
    }
    
    @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    </style>
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="logo"><h1>LocalPaste.rs</h1></div>
            <div class="quick-actions">
                <button id="new-paste" class="btn-primary" title="New Paste (Ctrl+N)">+ New</button>
                <button id="new-folder" class="btn-secondary" title="New Folder">+ Folder</button>
            </div>
            <div class="search-container">
                <input type="text" id="search" placeholder="Search... (Ctrl+K)" />
            </div>
            <div style="padding: 8px; margin-bottom: 8px;">
                <select id="sort-order" style="width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-primary); padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 13px;" title="Sort pastes">
                    <option value="date-desc">⬇ Newest first</option>
                    <option value="date-asc">⬆ Oldest first</option>
                    <option value="name-asc">⬆ Name (A-Z)</option>
                    <option value="name-desc">⬇ Name (Z-A)</option>
                </select>
            </div>
            
            <!-- Single tree view for everything -->
            <div class="pastes" style="flex: 1; overflow-y: auto; padding: 0 8px;">
                <ul id="tree-view" class="tree-view">
                    <!-- Tree will be rendered here -->
                </ul>
            </div>
        </aside>
        <main class="main-content">
            <header class="editor-header">
                <div class="paste-info">
                    <input type="text" id="paste-name" class="paste-name" placeholder="Auto-named..." style="background: transparent; border: 1px solid transparent; cursor: text; padding: 2px 6px; border-radius: 4px;" />
                    <span class="paste-meta">
                        <select id="paste-language" style="background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-primary); padding: 2px 6px; border-radius: 4px; cursor: pointer;">
                            <option value="">Auto-detect</option>
                            <option value="plaintext">Plain Text</option>
                            <option value="c">C</option>
                            <option value="cpp">C++</option>
                            <option value="csharp">C#</option>
                            <option value="css">CSS</option>
                            <option value="go">Go</option>
                            <option value="html">HTML</option>
                            <option value="java">Java</option>
                            <option value="javascript">JavaScript</option>
                            <option value="json">JSON</option>
                            <option value="latex">LaTeX</option>
                            <option value="markdown">Markdown</option>
                            <option value="python">Python</option>
                            <option value="rust">Rust</option>
                            <option value="shell">Shell/Bash</option>
                            <option value="toml">TOML</option>
                            <option value="xml">XML</option>
                            <option value="yaml">YAML</option>
                        </select> • 
                        <span id="paste-date">just now</span> • 
                        <span id="char-count">0 chars</span> • 
                        <span id="save-status" class="auto-saved" style="display: none;">✓ saved</span>
                    </span>
                </div>
                <div class="editor-actions">
                    <button id="download-paste" class="btn-icon" title="Download as file">💾</button>
                    <button id="delete-paste" class="btn-icon danger" title="Delete (Ctrl+D)">🗑️</button>
                </div>
            </header>
            <div id="editor-container" class="editor-container" style="position: relative;">
                <div id="highlight-layer" class="highlight-layer"></div>
                <textarea id="editor" spellcheck="false"></textarea>
            </div>
            <footer class="status-bar">
                <div class="status-left">
                    <span id="status-message">Ready</span>
                    <a href="https://github.com/pszemraj/localpaste.rs" target="_blank" style="margin-left: 16px; color: var(--text-secondary); text-decoration: none; font-size: 11px; opacity: 0.7;" title="View on GitHub">GitHub</a>
                    <span id="paste-id" style="margin-left: 16px; color: var(--text-secondary); font-size: 11px; cursor: pointer;" title="Click to copy ID"></span>
                </div>
                <div class="status-right"><span id="cursor-position">Ln 1, Col 1</span></div>
            </footer>
        </main>
    </div>

    <script type="module">
    // Import error reporting utilities
    import { ConsoleReporter, setupDebugMode } from '/js/utils/logger.js';
    import { ApiClient } from '/js/api/client.js';
    
    const reporter = new ConsoleReporter();
    setupDebugMode();
    
    // Make API client available globally
    window.ApiClient = ApiClient;
    
    // Try to import syntax highlighter
    import('/js/syntax/highlighter.js').then(module => {
        window.ModularSyntaxHighlighter = module.SyntaxHighlighter;
        console.log('Modular SyntaxHighlighter loaded successfully');
        // Set highlighter on the app if it exists
        if (window.app && !window.app.highlighter) {
            window.app.highlighter = new module.SyntaxHighlighter();
        }
    }).catch(err => {
        console.error('Failed to load modular syntax highlighter:', err.message || err.toString(), err);
    });
    
    // Try to import virtual scrolling
    import('/js/utils/virtual-scroll.js').then(module => {
        window.VirtualScroller = module.VirtualScroller;
        window.PaginationController = module.PaginationController;
        console.log('Virtual scrolling loaded successfully');
    }).catch(err => {
        console.error('Failed to load virtual scrolling:', err);
    });
    
    // Import editor module
    import('/js/editor/editor.js').then(module => {
        window.ModularEditor = module.Editor;
        console.log('Modular Editor loaded successfully');
    }).catch(err => {
        console.error('Failed to load modular editor:', err);
    });
    
    // Import common utilities
    import('/js/utils/common.js').then(module => {
        window.CommonUtils = module;
        console.log('Common utilities loaded successfully');
    }).catch(err => {
        console.error('Failed to load common utilities:', err);
    });
    
    // Import DOM utilities
    import('/js/utils/dom-helpers.js').then(module => {
        window.DOMUtils = module;
        console.log('DOM utilities loaded successfully');
    }).catch(err => {
        console.error('Failed to load DOM utilities:', err);
    });
    
    // Import error handling utilities
    import('/js/utils/error-handler.js').then(module => {
        window.ErrorBoundary = module.ErrorBoundary;
        window.ErrorHandler = module.ErrorHandler;
        console.log('Error handling utilities loaded successfully');
    }).catch(err => {
        console.error('Failed to load error handling utilities:', err);
    });
    
    // Import the LocalPaste class
    import('/js/LocalPasteClass.js').then(module => {
        window.LocalPaste = module.LocalPaste;
        console.log('LocalPaste class loaded from module');
    }).catch(err => {
        console.error('Failed to load LocalPaste class:', err);
    });
    </script>
    
    <script>
    // Application initialization code
    
    // Start the app
    document.addEventListener('DOMContentLoaded', () => {
        // Wait for modules to load
        const checkModules = setInterval(() => {
            if (window.LocalPaste && window.VirtualScroller && window.PaginationController && window.ModularSyntaxHighlighter) {
                clearInterval(checkModules);
                console.log('All modules ready, starting app');
                window.app = new LocalPaste();
                // Set the highlighter since app was created after module loaded
                if (!window.app.highlighter) {
                    window.app.highlighter = new window.ModularSyntaxHighlighter();
                }
            }
        }, 50);
        
        // Fallback if modules don't load
        setTimeout(() => {
            if (!window.app && window.LocalPaste) {
                clearInterval(checkModules);
                console.error('Some modules failed to load, app may have limited functionality');
                window.app = new LocalPaste();
            } else if (!window.app) {
                console.error('LocalPaste class failed to load! Application cannot start.');
            }
        }, 2000);
    });
    </script>
</body>
</html>
