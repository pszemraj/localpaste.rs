<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalPaste.rs</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
    /* Component-specific styles */
    .tree-folder.expanded .tree-contents {
        display: block !important;
    }
    
    .drag-over {
        background: rgba(100, 200, 255, 0.2);
    }
    
    .tree-item {
        margin: 2px 0;
    }
    </style>
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <!-- Sidebar component will mount here -->
        </aside>
        
        <main class="main-content">
            <!-- Editor component will mount here -->
        </main>
    </div>

    <script type="module">
    // Import all required modules
    import { ConsoleReporter, setupDebugMode } from '/js/utils/logger.js';
    import { ApiClient } from '/js/api/client.js';
    import { Store, actions as StoreActions, ActionTypes } from '/js/state/store.js';
    import { App } from '/js/components/App.js';
    
    // Set up error reporting
    const reporter = new ConsoleReporter();
    setupDebugMode();
    
    // Make required modules available globally for components
    window.ApiClient = ApiClient;
    window.Store = Store;
    window.StoreActions = StoreActions;
    window.ActionTypes = ActionTypes;
    
    // Import other utilities
    import('/js/syntax/highlighter.js').then(module => {
        window.ModularSyntaxHighlighter = module.SyntaxHighlighter;
        console.log('Syntax highlighter loaded');
    });
    
    import('/js/utils/common.js').then(module => {
        window.CommonUtils = module;
        console.log('Common utilities loaded');
    });
    
    import('/js/utils/error-handler.js').then(module => {
        window.ErrorBoundary = module.ErrorBoundary;
        console.log('Error handler loaded');
    });
    
    // Start the app when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
        console.log('Starting LocalPaste.rs with component architecture');
        
        // Create and start the app
        window.app = new App();
        
        console.log('LocalPaste.rs initialized - all functionality in modular components');
    });
    </script>
</body>
</html>
